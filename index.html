<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-custom navbar-dark px-4 w-100">
  <span class="navbar-brand fw-bold fs-3">💰 Finance Dashboard</span>
  <div class="ms-auto d-flex gap-2 align-items-center">

   <select id="roleSelect" class="form-select form-select-sm" onchange="changeRole()">
     <option value="admin">Admin</option>
     <option value="viewer" selected>Viewer</option>
   </select>

    <button class="btn btn-outline-light btn-sm" onclick="toggleDark()">🌙</button>
  </div>
</nav>

<div class="container-fluid px-4">
    
  <h5 id="username" class="mt-3 fw-semibold"></h5>

  <!-- CARDS -->
  <div class="row g-3 my-3">
  <div class="col-12 col-md-4">
    <div class="card text-center border-0" style="background-color: #d4edda;">
      <div class="card-body">
        <h6 class="card-subtitle text-dark  mb-1">Income</h6>
        <h4 class="card-title text-success fw-bold" id="income">₹0</h4>
      </div>
    </div>
  </div>

  <div class="col-12 col-md-4">
    <div class="card text-center border-0" style="background-color: #cce5ff;">
      <div class="card-body">
        <h6 class="card-subtitle text-dark mb-1">Balance</h6>
        <h4 class="card-title text-primary fw-bold" id="balance">₹0</h4>
      </div>
    </div>
  </div>

  <div class="col-12 col-md-4">
    <div class="card text-center border-0" style="background-color: #f8d7da;">
      <div class="card-body">
        <h6 class="card-subtitle text-dark mb-1">Expenses</h6>
        <h4 class="card-title text-danger fw-bold" id="expense">₹0</h4>
      </div>
    </div>
  </div>
</div>

  <!-- CHARTS -->
<div class="row g-3 mt-2">
  <div class="col-12 col-md-6">
    <div class="card p-3">
      <h6 class="text-muted mb-2">Spending by Category</h6>
      <canvas id="expenseChart"></canvas>
    </div>
  </div>
  <div class="col-12 col-md-6">
    <div class="card p-3">
      <h6 class="text-muted mb-2">Monthly Breakdown</h6>
      <canvas id="monthlyChart"></canvas>
    </div>
  </div>
  </div>
  <!-- INSIGHTS -->
  <div id="insights" class="alert alert-info mt-3" role="alert"></div>

<!-- ADMIN -->
  <div id="adminControls" class="p-3 mb-4 rounded-3"
     style="background-color: #eef2ff; border: 1px dashed #adb5bd;">
  <div class="row g-2 align-items-end">
    <div class="col-12 col-md-3">
      <label class="form-label small text-dark">💵 Amount</label>
      <input id="amount" type="number" class="form-control form-control-sm shadow-none"
             placeholder="e.g. 2000">
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label small text-dark">🏷️ Category</label>
      <input id="category" class="form-control form-control-sm shadow-none"
             placeholder="e.g. Food">
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label small text-dark">📂 Type</label>
      <select id="type" class="form-select form-select-sm shadow-none">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
    </div>
    <div class="col-12 col-md-3">
      <button class="btn btn-primary btn-sm w-100 fw-semibold"
              onclick="addTransaction()">
        ✚ Add 
      </button>
    </div>
  </div>
</div>
<p id="noDataMsg" style="display:none">No data available</p> 

<input 
  type="text" 
  id="search" 
  class="form-control mb-2" 
  placeholder="Search by category..."
  onkeyup="filterData()"/>

<!-- TABLE -->
<div class="table-responsive">
  <table class="table table-striped table-hover table-bordered align-middle">
    <thead class="table-primary">
      <tr>
        <th>Date</th>
        <th>Amount</th>
        <th>Category</th>
        <th>Type</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
<p id="filteredTotal" style="font-weight: bold; margin-top: 10px;"></p>

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="data.js"></script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
